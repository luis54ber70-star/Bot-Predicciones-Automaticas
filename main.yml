name: Sports Prediction Bot

on:
  schedule:
    # 10:00 AM CDMX (UTC-6) = 16:00 UTC → Fútbol
    - cron: '0 16 * * *'
    # 02:00 AM CDMX (UTC-6) = 08:00 UTC → MLB/NBA
    - cron: '0 8 * * *'
    # 11:00 PM CDMX (UTC-6) = 05:00 UTC (día siguiente) → Aprendizaje
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución manual'
        required: true
        default: 'futbol'
        type: choice
        options:
          - futbol
          - mlb_nba
          - aprendizaje

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Determinar el modo de ejecución ---
      - name: Determine execution mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            echo "mode=futbol" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 8 * * *" ]; then
            echo "mode=mlb_nba" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 5 * * *" ]; then
            echo "mode=aprendizaje" >> $GITHUB_OUTPUT
          else
            echo "mode=futbol" >> $GITHUB_OUTPUT
          fi

      - name: Run Bot (${{ steps.mode.outputs.mode }})
        run: python bot.py ${{ steps.mode.outputs.mode }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ALL_SPORT_API_KEY: ${{ secrets.ALL_SPORT_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # --- Commit y Push de archivos actualizados ---
      - name: Commit and Push updated files
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions Bot"
          git add historial.csv analisis.csv 2>/dev/null || true
          git diff --cached --quiet && echo "No hay cambios para commitear." && exit 0
          git commit -m "🤖 Actualizar historial y análisis — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
